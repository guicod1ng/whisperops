<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhisperOps - Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- Animated background -->
  <div class="bg-animation">
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
  </div>

  <main class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">
          <i class="fas fa-wave-square"></i>
        </div>
        <h1>WhisperOps</h1>
        <p>Analise suas conversas do WhatsApp</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" aria-label="Formulário de login">
        <div class="input-group">
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <label for="email" class="sr-only">Email</label>
            <input type="email" id="email" placeholder="Email" autocomplete="email" required>
          </div>
          <span class="error-text" id="emailError"></span>
        </div>

        <div class="input-group">
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <label for="senha" class="sr-only">Senha</label>
            <input type="password" id="senha" placeholder="Senha" autocomplete="current-password" required>
            <button type="button" class="toggle-password" id="togglePassword" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="error-text" id="senhaError"></span>
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="lembrar">
            <span class="checkbox-custom"></span>
            <span>Lembrar-me</span>
          </label>
          <a href="#" class="forgot-link">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="submit-btn">
          <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Entrar</span>
          <span class="btn-loader"><i class="fas fa-spinner fa-spin"></i></span>
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" style="display: none;" aria-label="Formulário de cadastro">
        <div class="input-group">
          <div class="input-wrapper">
            <i class="fas fa-building input-icon"></i>
            <label for="regNome" class="sr-only">Nome da empresa</label>
            <input type="text" id="regNome" placeholder="Nome da empresa" autocomplete="organization" required>
          </div>
          <span class="error-text" id="regNomeError"></span>
        </div>

        <div class="input-group">
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <label for="regEmail" class="sr-only">Email</label>
            <input type="email" id="regEmail" placeholder="Email" autocomplete="email" required>
          </div>
          <span class="error-text" id="regEmailError"></span>
        </div>

        <div class="input-group">
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <label for="regSenha" class="sr-only">Senha</label>
            <input type="password" id="regSenha" placeholder="Senha" autocomplete="new-password" required>
            <button type="button" class="toggle-password" id="toggleRegPassword" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="error-text" id="regSenhaError"></span>
        </div>

        <button type="submit" class="submit-btn">
          <span class="btn-text"><i class="fas fa-user-plus"></i> Criar Conta</span>
          <span class="btn-loader"><i class="fas fa-spinner fa-spin"></i></span>
        </button>
      </form>

      <!-- Toggle -->
      <p class="toggle-form">
        <span id="toggleText">Não tem conta?</span>
        <button type="button" id="toggleAuth" class="link-button">Cadastre-se</button>
      </p>

      <p id="erro" class="erro" role="alert" aria-live="polite"></p>
    </div>
  </main>
  <script src="login.js"></script>
</body>
</html>
